# ─── CI/CD Pipeline ───────────────────────────────────────────────────────────
# Covers: CI/CD, GitHub Actions, Testing, Docker Build, Deployment
# Triggers on push to main and pull requests

name: Smart Attendance CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # ─── Test Backend ────────────────────────────────────────────────────────────
  test-backend:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}

      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest
        run: |
          cd backend
          pytest tests/ -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/test_*.db

  # ─── Lint & Code Quality ─────────────────────────────────────────────────────
  lint:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install flake8 black

      - name: Run flake8
        run: |
          cd backend
          flake8 app/ --max-line-length=120 --ignore=E501,W503 || true

      - name: Check formatting
        run: |
          cd backend
          black --check app/ || true

  # ─── Build Docker Images ──────────────────────────────────────────────────────
  build:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        continue-on-error: true

      - name: Build Backend Image
        run: |
          docker build -t smartattendance-backend:latest ./backend
          echo "✅ Backend image built"

      - name: Build Frontend Image
        run: |
          docker build -t smartattendance-frontend:latest ./frontend
          echo "✅ Frontend image built"

  # ─── Deploy to Render ─────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to Render
        run: |
          echo "🚀 Deployment triggered"
          echo "Configure RENDER_DEPLOY_HOOK in GitHub Secrets to auto-deploy"
          # curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
