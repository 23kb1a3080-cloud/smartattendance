# ─── Docker Compose - Smart Attendance System ─────────────────────────────────
# Covers: Docker, Docker Compose, CI/CD, Deployment, Microservices
# Services: nginx, frontend, backend, redis, mongo

version: "3.9"

services:

  # ─── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: sa_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - sa_network

  # ─── Frontend (HTML/CSS/JS + Nginx) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sa_frontend
    restart: unless-stopped
    networks:
      - sa_network

  # ─── Backend (FastAPI) ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sa_backend
    environment:
      - DATABASE_URL=sqlite:///./attendance_db/attendance.db
      - REDIS_URL=redis://redis:6379/0
      - MONGODB_URL=mongodb://mongo:27017
      - SECRET_KEY=${SECRET_KEY:-smartattendance-secret-change-in-prod}
      - DEBUG=False
    volumes:
      - ./backend/attendance_db:/app/attendance_db
      - ./FaceAttendance/dataset:/app/../FaceAttendance/dataset
      - ./FaceAttendance/encodings:/app/../FaceAttendance/encodings
    depends_on:
      - redis
      - mongo
    restart: unless-stopped
    networks:
      - sa_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Celery Worker (Background Tasks) ───────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sa_celery
    command: celery -A app.celery_worker worker --loglevel=info --concurrency=2
    environment:
      - DATABASE_URL=sqlite:///./attendance_db/attendance.db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend/attendance_db:/app/attendance_db
      - ./FaceAttendance/dataset:/app/../FaceAttendance/dataset
      - ./FaceAttendance/encodings:/app/../FaceAttendance/encodings
    depends_on:
      - redis
      - backend
    restart: unless-stopped
    networks:
      - sa_network

  # ─── Redis (Cache + Celery Broker) ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sa_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - sa_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── MongoDB (NoSQL) ─────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: sa_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - sa_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  redis_data:
  mongo_data:

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  sa_network:
    driver: bridge
