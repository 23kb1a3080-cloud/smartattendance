<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attendance — Smart Attendance</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="navbar-placeholder"></div>
  <div class="layout">
    <div id="sidebar-placeholder"></div>
    <main class="main-content">

      <div class="page-header fade-in">
        <div>
          <h1 class="page-title">📋 Attendance</h1>
          <p class="page-subtitle" id="att-date">Loading...</p>
        </div>
        <div class="flex gap-2 flex-wrap">
          <input type="date" id="date-filter" class="form-control" style="width:auto"
                 onchange="loadAttendance()" />
          <button class="btn btn-primary" onclick="openMarkModal()">➕ Mark Attendance</button>
          <button class="btn btn-outline" onclick="exportJSON()">📥 Export JSON</button>
        </div>
      </div>

      <!-- Stats -->
      <div class="grid grid-4 gap-3 mb-4 fade-in">
        <div class="stat-card" style="--accent-color:var(--primary)">
          <div class="stat-icon">📋</div>
          <div class="stat-info">
            <div class="stat-value" id="a-total">—</div>
            <div class="stat-label">Total Records</div>
          </div>
        </div>
        <div class="stat-card" style="--accent-color:var(--success)">
          <div class="stat-icon">✅</div>
          <div class="stat-info">
            <div class="stat-value" id="a-present">—</div>
            <div class="stat-label">Present Today</div>
          </div>
        </div>
        <div class="stat-card" style="--accent-color:var(--danger)">
          <div class="stat-icon">❌</div>
          <div class="stat-info">
            <div class="stat-value" id="a-absent">—</div>
            <div class="stat-label">Absent Today</div>
          </div>
        </div>
        <div class="stat-card" style="--accent-color:var(--warning)">
          <div class="stat-icon">📊</div>
          <div class="stat-info">
            <div class="stat-value" id="a-rate">—</div>
            <div class="stat-label">Rate</div>
          </div>
        </div>
      </div>

      <!-- Attendance Table -->
      <div class="card fade-in">
        <div class="card-header">
          <h3 class="card-title">Attendance Records</h3>
          <span class="badge badge-info" id="att-count">0 records</span>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Roll No</th>
                <th>Name</th>
                <th>Date</th>
                <th>Time</th>
                <th>Status</th>
                <th>Confidence</th>
                <th>Method</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="att-table">
              <tr><td colspan="9" class="text-center p-3"><div class="spinner" style="margin:auto"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Mark Attendance Modal -->
  <div class="modal-overlay" id="mark-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>➕ Mark Attendance</h3>
        <button class="modal-close" onclick="closeMarkModal()">✕</button>
      </div>
      <form id="mark-form">
        <div class="form-group">
          <label class="form-label">Roll Number *</label>
          <input type="text" id="m-roll" class="form-control" placeholder="e.g. 23KB1A3080" required />
        </div>
        <div class="form-group">
          <label class="form-label">Student Name *</label>
          <input type="text" id="m-name" class="form-control" placeholder="Student name" required />
        </div>
        <div class="grid grid-2 gap-2">
          <div class="form-group">
            <label class="form-label">Date *</label>
            <input type="date" id="m-date" class="form-control" required />
          </div>
          <div class="form-group">
            <label class="form-label">Time *</label>
            <input type="time" id="m-time" class="form-control" required />
          </div>
        </div>
        <div class="grid grid-2 gap-2">
          <div class="form-group">
            <label class="form-label">Status</label>
            <select id="m-status" class="form-control">
              <option value="Present">Present</option>
              <option value="Late">Late</option>
              <option value="Absent">Absent</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Confidence (0-1)</label>
            <input type="number" id="m-confidence" class="form-control"
                   placeholder="0.95" min="0" max="1" step="0.01" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Notes</label>
          <input type="text" id="m-notes" class="form-control" placeholder="Optional notes" />
        </div>
        <div class="flex gap-2 mt-3">
          <button type="submit" class="btn btn-primary flex-1" id="mark-btn">✅ Mark Attendance</button>
          <button type="button" class="btn btn-secondary" onclick="closeMarkModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script>
    UI.requireAuth();
    renderLayout('attendance');

    const today = new Date().toISOString().split('T')[0];
    document.getElementById('date-filter').value = today;
    document.getElementById('att-date').textContent =
      new Date().toLocaleDateString('en-IN', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

    async function loadStats() {
      try {
        const stats = await AttendanceAPI.stats();
        if (!stats) return;
        document.getElementById('a-total').textContent   = stats.total_records;
        document.getElementById('a-present').textContent = stats.present_today;
        document.getElementById('a-absent').textContent  = stats.absent_today;
        document.getElementById('a-rate').textContent    = stats.attendance_rate + '%';
      } catch (e) {}
    }

    async function loadAttendance() {
      const dateVal = document.getElementById('date-filter').value;
      try {
        const records = await AttendanceAPI.list(dateVal ? { date: dateVal } : {}) || [];
        document.getElementById('att-count').textContent = `${records.length} records`;
        const tbody = document.getElementById('att-table');
        if (records.length === 0) {
          tbody.innerHTML = '<tr><td colspan="9" class="text-center text-muted p-3">No records found</td></tr>';
          return;
        }
        tbody.innerHTML = records.map((r, i) => `
          <tr>
            <td class="text-muted">${i + 1}</td>
            <td><span class="badge badge-primary">${r.roll_no}</span></td>
            <td><strong>${r.name}</strong></td>
            <td>${r.date}</td>
            <td>${UI.formatTime(r.time)}</td>
            <td>
              <span class="badge ${r.status==='Present'?'badge-success':r.status==='Late'?'badge-warning':'badge-danger'}">
                ${r.status}
              </span>
            </td>
            <td>${UI.formatConfidence(r.confidence)}</td>
            <td><span class="badge badge-info">${r.verification_method}</span></td>
            <td>
              <button class="btn btn-danger btn-sm" onclick="deleteRecord(${r.id})">🗑️</button>
            </td>
          </tr>
        `).join('');
      } catch (err) {
        UI.showToast('Failed to load attendance: ' + err.message, 'error');
      }
    }

    async function deleteRecord(id) {
      if (!confirm('Delete this attendance record?')) return;
      try {
        await AttendanceAPI.delete(id);
        UI.showToast('Record deleted', 'success');
        loadAttendance();
        loadStats();
      } catch (err) {
        UI.showToast(err.message, 'error');
      }
    }

    async function exportJSON() {
      const dateVal = document.getElementById('date-filter').value;
      try {
        const data = await AttendanceAPI.exportJson(dateVal || null);
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `attendance_${dateVal || 'all'}.json`;
        a.click();
        URL.revokeObjectURL(url);
        UI.showToast('Exported successfully!', 'success');
      } catch (err) {
        UI.showToast(err.message, 'error');
      }
    }

    function openMarkModal() {
      const now = new Date();
      document.getElementById('m-date').value = now.toISOString().split('T')[0];
      document.getElementById('m-time').value = now.toTimeString().substring(0, 5);
      document.getElementById('mark-modal').classList.add('active');
    }

    function closeMarkModal() {
      document.getElementById('mark-modal').classList.remove('active');
    }

    document.getElementById('mark-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('mark-btn');
      UI.showLoading(btn, 'Marking...');
      try {
        const conf = document.getElementById('m-confidence').value;
        await AttendanceAPI.mark({
          roll_no: document.getElementById('m-roll').value.trim(),
          name: document.getElementById('m-name').value.trim(),
          date: document.getElementById('m-date').value,
          time: document.getElementById('m-time').value + ':00',
          status: document.getElementById('m-status').value,
          confidence: conf ? parseFloat(conf) : null,
          notes: document.getElementById('m-notes').value.trim() || null,
          verification_method: 'manual',
        });
        UI.showToast('Attendance marked!', 'success');
        closeMarkModal();
        loadAttendance();
        loadStats();
      } catch (err) {
        UI.showToast(err.message, 'error');
      } finally {
        UI.hideLoading(btn);
      }
    });

    loadStats();
    loadAttendance();
  </script>
</body>
</html>
