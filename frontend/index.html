<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Attendance System — Login</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }

    .login-wrapper {
      width: 100%; max-width: 440px;
      padding: 1rem;
      animation: fadeIn 0.5s ease;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-logo .logo-circle {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 20px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 2rem;
      margin-bottom: 1rem;
      box-shadow: var(--shadow-glow);
      animation: glow 3s ease infinite;
    }

    .login-logo h1 { font-size: 1.6rem; }
    .login-logo p  { color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.25rem; }

    .login-card {
      background: var(--card-gradient);
      border: 1px solid var(--dark-border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      box-shadow: var(--shadow);
    }

    .tab-buttons {
      display: flex;
      background: rgba(15, 23, 42, 0.6);
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 1.5rem;
    }

    .tab-btn {
      flex: 1; padding: 0.6rem;
      border: none; background: none;
      color: var(--text-secondary);
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: var(--transition);
    }

    .tab-btn.active {
      background: var(--primary);
      color: white;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn 0.3s ease; }

    .divider {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.8rem;
      margin: 1rem 0;
      position: relative;
    }

    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%; width: 40%;
      height: 1px;
      background: var(--dark-border);
    }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    .demo-creds {
      background: rgba(79, 70, 229, 0.08);
      border: 1px solid rgba(79, 70, 229, 0.2);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.82rem;
      color: var(--text-secondary);
      margin-top: 1rem;
    }

    .demo-creds strong { color: var(--primary-light); }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-logo">
      <div class="logo-circle">🎓</div>
      <h1>Smart Attendance</h1>
      <p>Face Recognition Attendance System</p>
    </div>

    <div class="login-card">
      <div class="tab-buttons">
        <button class="tab-btn active" onclick="switchTab('login')">Login</button>
        <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- Login Form -->
      <div id="tab-login" class="tab-content active">
        <div id="login-alert"></div>
        <form id="login-form">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" id="login-username" class="form-control"
                   placeholder="Enter username" required autocomplete="username" />
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" id="login-password" class="form-control"
                   placeholder="Enter password" required autocomplete="current-password" />
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">
            🔐 Login
          </button>
        </form>

        <div class="demo-creds">
          <strong>Demo credentials:</strong><br/>
          Username: <strong>admin</strong> &nbsp;|&nbsp; Password: <strong>admin123</strong>
        </div>
      </div>

      <!-- Signup Form -->
      <div id="tab-signup" class="tab-content">
        <div id="signup-alert"></div>
        <form id="signup-form">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" id="signup-name" class="form-control"
                   placeholder="Your full name" required />
          </div>
          <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" id="signup-username" class="form-control"
                   placeholder="Choose a username" required />
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" id="signup-email" class="form-control"
                   placeholder="your@email.com" required />
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" id="signup-password" class="form-control"
                   placeholder="Min 6 characters" required />
          </div>
          <div class="form-group">
            <label class="form-label">Role</label>
            <select id="signup-role" class="form-control">
              <option value="teacher">Teacher</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <button type="submit" class="btn btn-success btn-block btn-lg" id="signup-btn">
            ✅ Create Account
          </button>
        </form>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="js/api.js"></script>
  <script>
    // Redirect if already logged in
    if (Auth.isLoggedIn()) window.location.href = 'dashboard.html';

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'signup'));
      });
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
    }

    function showAlert(id, message, type = 'danger') {
      document.getElementById(id).innerHTML =
        `<div class="alert alert-${type}">${message}</div>`;
    }

    // Login
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      UI.showLoading(btn, 'Logging in...');
      document.getElementById('login-alert').innerHTML = '';

      try {
        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value;
        await AuthAPI.login(username, password);
        UI.showToast('Login successful! Redirecting...', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 800);
      } catch (err) {
        showAlert('login-alert', err.message);
        UI.hideLoading(btn);
      }
    });

    // Signup
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('signup-btn');
      UI.showLoading(btn, 'Creating account...');
      document.getElementById('signup-alert').innerHTML = '';

      try {
        await AuthAPI.signup({
          full_name: document.getElementById('signup-name').value.trim(),
          username: document.getElementById('signup-username').value.trim(),
          email: document.getElementById('signup-email').value.trim(),
          password: document.getElementById('signup-password').value,
          role: document.getElementById('signup-role').value,
        });
        UI.showToast('Account created! Please login.', 'success');
        switchTab('login');
      } catch (err) {
        showAlert('signup-alert', err.message);
      } finally {
        UI.hideLoading(btn);
      }
    });
  </script>
</body>
</html>
