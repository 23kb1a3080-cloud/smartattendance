# ─── Render Deployment Config ─────────────────────────────────────────────────
# Covers: Render Hosting, Cloud Deployment
# Deploy at: https://render.com

services:
  # Backend API
  - type: web
    name: smartattendance-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./attendance_db/attendance.db
      - key: DEBUG
        value: "False"
    healthCheckPath: /health
    autoDeploy: true

  # Frontend (Static Site)
  - type: web
    name: smartattendance-frontend
    runtime: static
    rootDir: frontend
    staticPublishPath: .
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
